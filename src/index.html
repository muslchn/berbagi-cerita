<!DOCTYPE html>
<html lang="id">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="%BASE_URL%favicon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    
    <!-- Theme Color for PWA -->
    <meta name="theme-color" content="#2c3e50" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <title>Berbagi Cerita - Aplikasi Berbagi Pengalaman</title>

    <script type="module" src="%BASE_URL%scripts/index.js"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <header>
      <div class="main-header container">
        <a class="brand-name" href="#/">Berbagi Cerita</a>

        <nav id="navigation-drawer" class="navigation-drawer" aria-label="Navigasi utama">
          <ul id="nav-list" class="nav-list">
            <li><a href="#/">Beranda</a></li>
            <li><a href="#/map">Peta</a></li>
            <li><a href="#/add">Tambah Cerita</a></li>
            <li><a href="#/about">Tentang</a></li>
            <li id="auth-links">
              <a href="#/login">Masuk</a>
            </li>
          </ul>
        </nav>

        <button id="drawer-button" class="drawer-button" aria-label="Buka menu navigasi" aria-expanded="false">☰</button>
      </div>
    </header>

    <main id="main-content" class="main-content" tabindex="-1"></main>
    
    <footer class="footer">
      <div class="container">
        <p>&copy; 2026 Berbagi Cerita. Dibuat untuk Dicoding Academy.</p>
      </div>
    </footer>

    <!-- Service Worker Registration -->
    <script type="module">
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register(`${import.meta.env.BASE_URL}sw.js`)
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
              
              // Check for updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New content available, show update notification
                    if (confirm('Update baru tersedia! Reload untuk mengupdate?')) {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                  }
                });
              });
            })
            .catch((error) => {
              console.error('[PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
